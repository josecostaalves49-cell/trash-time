<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel do Administrador</title>

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  text-align: center;
}

h1 {
  color: #333;
}

.card {
  background: white;
  margin: 15px auto;
  padding: 15px;
  width: 300px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

img {
  width: 100%;
  border-radius: 8px;
}

button {
  margin: 5px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.aprovar {
  background: green;
  color: white;
}

.reprovar {
  background: red;
  color: white;
}
</style>

</head>

<body>

<h1>👨‍💼 Painel do ADM</h1>

<div id="lista"></div>

<script>

let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

let lista = document.getElementById("lista");

function carregarUsuarios() {
  lista.innerHTML = "";

  usuarios.forEach((u, index) => {

    let status = u.aprovado ? "✅ Aprovado" : "⏳ Pendente";

    lista.innerHTML += `
      <div class="card">
        <h3>${u.nome}</h3>
        <p><b>CPF:</b> ${u.cpf}</p>
        <p>${status}</p>


        <p><b>Selfie:</b></p>
        <img src="${u.selfie}">

        <button class="aprovar" onclick="aprovar(${index})">Aprovar</button>
        <button class="reprovar" onclick="reprovar(${index})">Reprovar</button>
      </div>
    `;
  });
}

function aprovar(i) {
  usuarios[i].aprovado = true;
  localStorage.setItem("usuarios", JSON.stringify(usuarios));
  carregarUsuarios();
}

function reprovar(i) {
  usuarios.splice(i, 1);
  localStorage.setItem("usuarios", JSON.stringify(usuarios));
  carregarUsuarios();
}

// carregar ao abrir
carregarUsuarios();

</script>

</body>
</html>
