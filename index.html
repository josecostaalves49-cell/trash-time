<<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro Coletor</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🚛 Cadastro de Coletor</h1>

<!-- BOTÃO PRA ATIVAR CÂMERA -->
<button onclick="iniciarCamera()">📷 Ativar Câmera</button>

<br><br>

<input type="text" id="nome" placeholder="Nome completo">
<input type="text" id="cpf" placeholder="CPF">
<input type="email" id="email" placeholder="Email">
<input type="password" id="senha" placeholder="Senha">

<!-- DOCUMENTO -->
<h3>📸 Documento</h3>
<video id="videoDoc" width="250" autoplay playsinline></video>
<br>
<button onclick="capturar('doc')">Capturar Documento</button>
<br>
<img id="imgDoc" width="250">

<hr>

<!-- SELFIE -->
<h3>🤳 Selfie</h3>
<video id="videoSelfie" width="250" autoplay playsinline></video>
<br>
<button onclick="capturar('selfie')">Capturar Selfie</button>
<br>
<img id="imgSelfie" width="250">

<br><br>

<button onclick="cadastrar()">Cadastrar</button>

<hr>

<h2>Login</h2>

<input type="email" id="loginEmail" placeholder="Email">
<input type="password" id="loginSenha" placeholder="Senha">
<button onclick="login()">Entrar</button>

<!-- LIGAÇÃO COM O JS -->
<script src="script.js"></script>

</body>
</html>
